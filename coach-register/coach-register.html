<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Coach – FitScape</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../fitscape-shared.css">
    <link rel="stylesheet" href="coach-register-styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="fs-subnav">
        <a href="../index.html" class="fs-back-btn">&#8592; Back to Home</a>
        <a href="../index.html" class="fs-brand">FitScape</a>
    </nav>

    <main class="fs-section">
        <div class="container">
            <h1 class="fs-page-title">Register as a Coach</h1>
            <p class="fs-page-subtitle">Join our network of certified fitness professionals</p>

            <form id="coachRegisterForm" novalidate>

                <!-- Personal Details -->
                <div class="register-section">
                    <h4 class="section-heading">
                        <span class="section-num">01</span> Personal Details
                    </h4>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="fs-label" for="firstName">First Name</label>
                            <input type="text" class="fs-input" id="firstName" placeholder="First Name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="middleName">Middle Name</label>
                            <input type="text" class="fs-input" id="middleName" placeholder="Middle Name">
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="lastName">Last Name</label>
                            <input type="text" class="fs-input" id="lastName" placeholder="Last Name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="dob">Date of Birth</label>
                            <input type="date" class="fs-input" id="dob" required>
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="gender">Gender</label>
                            <select class="fs-select" id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="contact">Phone Number</label>
                            <input type="tel" class="fs-input" id="contact" placeholder="+91 98765 43210" required>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="email">Email Address</label>
                            <input type="email" class="fs-input" id="email" placeholder="your@email.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="address">Current Address</label>
                            <textarea class="fs-textarea" id="address" placeholder="Your residential address" rows="1"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Experience Details -->
                <div class="register-section">
                    <h4 class="section-heading">
                        <span class="section-num">02</span> Experience Details
                    </h4>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="fs-label" for="profession">Profession</label>
                            <input type="text" class="fs-input" id="profession" placeholder="Trainer / Dietician / Rehab" required>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="experience">Years of Experience</label>
                            <input type="number" class="fs-input" id="experience" placeholder="e.g. 5" min="0" max="60" required>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="employment">Current Employment</label>
                            <input type="text" class="fs-input" id="employment" placeholder="Gym Name / Self-employed / None">
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="clientTypes">Types of Clients</label>
                            <input type="text" class="fs-input" id="clientTypes" placeholder="Athletes / Senior Citizens / etc.">
                        </div>
                    </div>
                </div>

                <!-- Certification Details -->
                <div class="register-section">
                    <h4 class="section-heading">
                        <span class="section-num">03</span> Certification Details
                    </h4>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="fs-label" for="certTitle">Certification Title</label>
                            <input type="text" class="fs-input" id="certTitle" placeholder="Certification Name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="issuer">Issuing Authority</label>
                            <input type="text" class="fs-input" id="issuer" placeholder="Authority / Institution" required>
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="certId">Certification ID</label>
                            <input type="text" class="fs-input" id="certId" placeholder="Certification Number">
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="certDate">Date of Certification</label>
                            <input type="date" class="fs-input" id="certDate">
                        </div>
                        <div class="col-md-4">
                            <label class="fs-label" for="certExpiry">Expiration Date</label>
                            <input type="date" class="fs-input" id="certExpiry">
                        </div>
                    </div>
                </div>

                <!-- Proofs / Upload -->
                <div class="register-section">
                    <h4 class="section-heading">
                        <span class="section-num">04</span> Upload Proofs
                    </h4>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="fs-label" for="photo">Profile Photo</label>
                            <div class="file-upload-wrap">
                                <input type="file" class="file-input" id="photo" name="photo" accept="image/*">
                                <label class="file-upload-label" for="photo">
                                    <span class="file-icon">📷</span>
                                    <span>Click to upload your photo</span>
                                    <small>JPG, PNG up to 5 MB</small>
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="fs-label" for="certFile">Certification Document</label>
                            <div class="file-upload-wrap">
                                <input type="file" class="file-input" id="certFile" name="certFile" accept="image/*,.pdf">
                                <label class="file-upload-label" for="certFile">
                                    <span class="file-icon">📄</span>
                                    <span>Click to upload certification</span>
                                    <small>JPG, PNG, or PDF up to 10 MB</small>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Declaration & Submit -->
                <div class="register-section">
                    <h4 class="section-heading">
                        <span class="section-num">05</span> Declaration
                    </h4>
                    <div class="declaration-box">
                        <label class="decl-check">
                            <input type="checkbox" required>
                            <span>To the best of my knowledge, all details provided are accurate and complete.</span>
                        </label>
                        <label class="decl-check">
                            <input type="checkbox" required>
                            <span>I affirm these details are shared truthfully and to the best of my ability.</span>
                        </label>
                        <label class="decl-check">
                            <input type="checkbox" required>
                            <span>I have read, understood, and agree to abide by all the terms and conditions.</span>
                        </label>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="fs-btn-primary submit-register-btn" id="coach-register-submit">
                            Submit Registration
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
